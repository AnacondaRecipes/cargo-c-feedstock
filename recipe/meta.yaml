{% set name = "cargo-c" %}
{% set version = "0.10.19" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/lu-zero/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 4136fbb1c25b1afdf1aaf473d00e532b73bbe02c7c53cb44965aff41ed328d20

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config
  host:
    - libcurl {{ libcurl }}    # [unix]
    - openssl {{ openssl }}    # [unix]
    - zlib {{ zlib }}          # [unix]
    - libgit2 {{ libgit2 }}
    - libiconv {{ libiconv }}  # [osx]
  run:
    - pkg-config  # [unix]

test:
  commands:
    - test -f "${PREFIX}/bin/cargo-cinstall"  # [unix]
    - test -f "${PREFIX}/bin/cargo-cbuild"    # [unix]
    - test -f "${PREFIX}/bin/cargo-ctest"     # [unix]
    - test -f "${PREFIX}/bin/cargo-capi"      # [unix]

    - if not exist "%LIBRARY_BIN%\cargo-cinstall.exe" exit 1  # [win]
    - if not exist "%LIBRARY_BIN%\cargo-cbuild.exe" exit 1    # [win]
    - if not exist "%LIBRARY_BIN%\cargo-ctest.exe" exit 1     # [win]
    - if not exist "%LIBRARY_BIN%\cargo-capi.exe" exit 1      # [win]

    - cargo-cinstall --version  # [unix]
    - cargo-cbuild --version    # [unix]
    - cargo-ctest --version     # [unix]
    - cargo-capi --version      # [unix]

    - cargo-cinstall.exe --version  # [win]
    - cargo-cbuild.exe --version    # [win]
    - cargo-ctest.exe --version     # [win]
    - cargo-capi.exe --version      # [win]

about:
  home: https://github.com/lu-zero/cargo-c
  dev_url: https://github.com/lu-zero/cargo-c
  doc_url: https://github.com/lu-zero/cargo-c/blob/master/README.md
  summary: build and install C-compatible libraries
  description: |
    cargo applet to build and install C-ABI compatible dynamic and static libraries.
    It produces and installs a correct pkg-config file, a static library and a dynamic library, 
    and a C header to be used by any C (and C-compatible) software.
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - hmaarrfk
    - carterbox
